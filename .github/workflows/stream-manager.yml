


# 1. Naye Repo Mein Cancel/Delete Fail Kyun Hua? (The Technical Fix)
# Naya GitHub account aur nayi repository jab banti hai, toh GitHub by default uski security settings ko bohat strict rakhta hai. Aapka workflow chal gaya aur usne streams.csv se data utha liya (kyunke Read permission default hoti hai), lekin usne baqi workflows ko Cancel ya kachra Delete nahi kiya kyunke uske paas API ke zariye modifications karne ki permission nahi thi.

# Iska Fix Yeh Hai:

# Apni GitHub Repository mein jayen.

# Upar Settings tab par click karein.

# Left menu mein Actions par click karein aur phir General mein jayen.

# Scroll kar ke bilkul neechay Workflow permissions ke section mein aayen.

# Wahan "Read repository contents and packages permissions" select hoga. Aapko usay change kar ke "Read and write permissions" par tick karna hai.

# Usi ke neechay "Allow GitHub Actions to create and approve pull requests" ko bhi check kar dein aur Save karein.

# Ab aapka manager script perfectly workflows ko kill aur delete kar payega.




name: Always-On Stream Manager (All-In-One Control)

on:
  workflow_dispatch:
    inputs:
      stop_time:
        description: 'Auto-stop time in PKT (e.g., 3:00 AM, 12:00 AM, 12:30 PM) or type "None"'
        required: true
        default: '3:00 AM'

permissions:
  contents: write
  actions: write

jobs:
  super-manager:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 Hours Max Limit

    steps:
      - name: Get Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Super Manager Loop (Every 5 Minutes)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }} # 👈 FIXED: GitHub CLI Error se bachne ke liye
          GITHUB_RUN_ID: ${{ github.run_id }}
          STOP_TIME: ${{ github.event.inputs.stop_time }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          node -e "
            const fs = require('fs');
            const { execSync } = require('child_process');

            const LOOP_DURATION = 21000000; // 5 hours 50 minutes
            const CHECK_INTERVAL = 300000; // Exact 5 Minutes (300,000 ms)
            const startMs = Date.now();
            const currentRunId = process.env.GITHUB_RUN_ID;
            const stopTimeInput = (process.env.STOP_TIME || '3:00 AM').trim();

            // 🕰️ Helper Function: Logging ke liye exact PKT Time
            function getPktTime(offsetMs = 0) {
              return new Date(Date.now() + offsetMs).toLocaleString('en-US', { 
                timeZone: 'Asia/Karachi', 
                hour12: true, month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' 
              });
            }

            console.log('\n==================================================');
            console.log(\`[*] SUPER MANAGER STARTED AT: \${getPktTime()}\`);
            console.log(\`[*] TARGET AUTO-STOP TIME: \${stopTimeInput}\`);
            console.log('==================================================');

            async function startLoop() {
              let loopCount = 1;

              while (Date.now() - startMs < LOOP_DURATION) {
                try {
                  const currentUptime = ((Date.now() - startMs) / 60000).toFixed(1);
                  
                  console.log('\n--------------------------------------------------');
                  console.log(\`[⏱️] SYSTEM CHECK ROUND #\${loopCount}\`);
                  console.log(\`[📍] Current Time: \${getPktTime()} (PKT)\`);
                  console.log(\`[⏳] Manager Uptime: \${currentUptime} Minutes\`);
                  console.log('--------------------------------------------------');

                  // 🛑 FIXED: Flawless PKT Mathematical Time Calculation (Safe from Runner Timezone bugs)
                  const nowUtc = new Date();
                  const pktDate = new Date(nowUtc.getTime() + (5 * 60 * 60 * 1000));
                  const pktHours = pktDate.getUTCHours();
                  const pktMinutes = pktDate.getUTCMinutes();

                  // =========================================================================
                  // 🛑 DYNAMIC CRITICAL SWITCH: AUTO CLEANUP RESET CHECK
                  // =========================================================================
                  let triggerCleanup = false;

                  if (stopTimeInput.toLowerCase() !== 'none') {
                    const timeMatch = stopTimeInput.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
                    if (timeMatch) {
                      let [_, stopHoursStr, stopMinutesStr, stopAmpm] = timeMatch;
                      let stopHours = parseInt(stopHoursStr);
                      let stopMinutes = parseInt(stopMinutesStr);

                      if (stopAmpm.toUpperCase() === 'PM' && stopHours < 12) stopHours += 12;
                      if (stopAmpm.toUpperCase() === 'AM' && stopHours === 12) stopHours = 0;

                      // FIXED: Total Minutes logic to perfectly handle hour/midnight changes
                      const currentTotalMins = (pktHours * 60) + pktMinutes;
                      const stopTotalMins = (stopHours * 60) + stopMinutes;

                      let diffMins = currentTotalMins - stopTotalMins;
                      if (diffMins < 0) diffMins += 24 * 60; // Handle midnight rollover

                      // Triggers if current time is EXACTLY at or up to 15 mins passed the stop time
                      if (diffMins >= 0 && diffMins <= 15) {
                        triggerCleanup = true;
                      }
                    } else {
                      console.log(\`[!] Warning: Invalid time format provided (\${stopTimeInput}). Expected e.g., 3:00 AM\`);
                    }
                  }

                  if (triggerCleanup) {
                    console.log('\n==================================================');
                    console.log(\`[🛑] TARGET TIME (\${stopTimeInput}) REACHED! STARTING SYSTEM RESET...\\n\`);
                    console.log('==================================================');

                    let otherRunsPending = true;
                    let attempts = 0;

                    // STEP 1: STOP ALL OTHER WORKFLOWS
                    while (otherRunsPending && attempts < 6) {
                      attempts++;
                      console.log(\`[*] Scanning running workflows... (Attempt \${attempts}/6)\`);
                      
                      const runsJson = execSync('gh run list --status in_progress --json databaseId,workflowName', { encoding: 'utf8' });
                      const runs = JSON.parse(runsJson || '[]');
                      const otherRuns = runs.filter(r => String(r.databaseId) !== String(currentRunId));

                      if (otherRuns.length === 0) {
                        console.log('[🎉] Success: Saare dusre running actions stop ho chuke hain!');
                        otherRunsPending = false;
                        break;
                      }

                      console.log(\`[!] \${otherRuns.length} running actions mile hain. Force cancelling them...\`);
                      for (const r of otherRuns) {
                        try {
                          console.log(\`[-] Cancelling Run ID: \${r.databaseId} (\${r.workflowName})\`);
                          execSync(\`gh run cancel \${r.databaseId}\`, { stdio: 'ignore' });
                        } catch(e) {}
                      }

                      if (otherRunsPending) {
                        console.log('[*] 30 seconds wait kar rahe hain taake actions band ho jayein...');
                        await new Promise(r => setTimeout(r, 30000));
                      }
                    }

                    // STEP 2: DELETE ALL KACHRA (FIXED TO DELETE SUCCESS/FAILED/CANCELLED ALL)
                    console.log('\n[*] Shifting to Step 2: Cleaning ALL old workflows (Kachra)...');
                    await new Promise(r => setTimeout(r, 10000)); 

                    const kachraJson = execSync('gh run list --limit 1000 --json databaseId', { encoding: 'utf8' });
                    const kachraRuns = JSON.parse(kachraJson || '[]');

                    if (kachraRuns.length > 0) {
                      console.log(\`[!] \${kachraRuns.length} purane workflows history mein mile hain. Permanently deleting...\`);
                      let delCount = 0;
                      for (const r of kachraRuns) {
                        if (String(r.databaseId) !== String(currentRunId)) {
                          try {
                            execSync(\`gh run delete \${r.databaseId}\`, { stdio: 'ignore' });
                            delCount++;
                          } catch(e) {}
                        }
                      }
                      console.log(\`[+] Safai Mukammal! \${delCount} kachra workflows completely urra diye gaye.\`);
                    }

                    console.log('\n[🎉] ALL DONE! System is 100% reset and clean.');
                    console.log(\`[🛑] Manager self-destructing at \${getPktTime()}...\`);
                    try {
                      execSync(\`gh run cancel \${currentRunId}\`);
                    } catch(e) {}
                    process.exit(0);
                  }

                  // =========================================================================
                  // 🔄 NORMAL MODE: STREAM SCHEDULER CHECK
                  // =========================================================================
                  execSync('git pull origin main --rebase', { stdio: 'ignore' });
                  
                  if (fs.existsSync('streams.csv')) {
                    const csvData = fs.readFileSync('streams.csv', 'utf8');
                    const lines = csvData.trim().split('\n');
                    const header = lines[0];
                    let updatedCsv = [header];
                    let changesMade = false;
                    const nowUtcStreams = new Date();

                    for (let i = 1; i < lines.length; i++) {
                      if (!lines[i].trim()) continue;
                      const parts = lines[i].split(',').map(s => s.trim());
                      if (parts.length < 6) { updatedCsv.push(lines[i]); continue; }
                      
                      const [url, channel, quality, server, startTimeStr, duration] = parts;
                      if (!startTimeStr || startTimeStr === 'None' || startTimeStr === '') {
                        updatedCsv.push(lines[i]); continue;
                      }

                      const match = startTimeStr.match(/(\d{4}-\d{2}-\d{2})\s+(\d{1,2}):(\d{2})\s+(AM|PM)/i);
                      if (match) {
                        let [_, datePart, hours, minutes, ampm] = match;
                        hours = parseInt(hours);
                        if (ampm.toUpperCase() === 'PM' && hours < 12) hours += 12;
                        if (ampm.toUpperCase() === 'AM' && hours === 12) hours = 0;

                        const targetDateStr = \`\${datePart}T\${hours.toString().padStart(2, '0')}:\${minutes}:00+05:00\`;
                        const targetTime = new Date(targetDateStr);
                        const diffMinutesStream = (targetTime - nowUtcStreams) / (1000 * 60);

                        if (diffMinutesStream <= 20 && diffMinutesStream >= -5) {
                          const formattedUrls = url.replace(/\|/g, ',');
                          
                          console.log(\`\n[🚀] TRIGGER WINDOW HIT! Starting Channel \${channel} (Time Diff: \${diffMinutesStream.toFixed(1)}m)\`);
                          const cmd = \`gh workflow run main.yml -f target_urls='\${formattedUrls}' -f okru_stream_channel='\${channel}' -f stream_quality='\${quality}' -f server_selection='\${server}' -f custom_duration='\${duration}'\`;
                          try {
                            execSync(cmd, { stdio: 'inherit' });
                            changesMade = true;
                          } catch(e) { updatedCsv.push(lines[i]); }
                        } else if (diffMinutesStream < -5) {
                          changesMade = true; 
                        } else {
                          updatedCsv.push(lines[i]); 
                        }
                      } else {
                        updatedCsv.push(lines[i]);
                      }
                    }

                    if (changesMade) {
                      fs.writeFileSync('streams.csv', updatedCsv.join('\n') + '\n');
                      execSync('git add streams.csv && git commit -m \"Bot: Stream triggered and queue updated\" && git push', { stdio: 'ignore' });
                      console.log('[+] streams.csv updated and pushed successfully!');
                    }
                  }

                } catch(err) {
                  console.log('[!] Loop warning: ' + err.message);
                }

                console.log(\`[*] Check round \${loopCount} completed.\`);
                console.log(\`[⏰] Sleeping for 5 mins... Next check will be exactly at: \${getPktTime(CHECK_INTERVAL)} (PKT)\`);
                
                loopCount++;
                await new Promise(r => setTimeout(r, CHECK_INTERVAL));
              }

              // =========================================================================
              // ⏱️ SHIFT OVERLAP LOGIC (Passes custom stop_time to next runner)
              // =========================================================================
              console.log('\n==================================================');
              console.log(\`[*] 5h 50m Completed at \${getPktTime()}! Triggering next Stream Manager...\`);
              try {
                # const nextManagerCmd = \`gh workflow run stream-manager.yml -f stop_time="\${stopTimeInput}"\`;
                const nextManagerCmd = `gh workflow run stream-manager.yml -f stop_time='${stopTimeInput}'`;
                execSync(nextManagerCmd, { stdio: 'inherit' });
                console.log('[+] Next manager triggered successfully with configuration target: ' + stopTimeInput);
                console.log('[+] Waiting 5 minutes for handover...');
                
                await new Promise(r => setTimeout(r, 300000));
                console.log(\`[+] Handover complete at \${getPktTime()}. Old manager shutting down cleanly.\`);
              } catch(err) {
                console.error('[-] Failed to loop manager:', err.message);
              }
              process.exit(0);
            }

            startLoop();
          "
